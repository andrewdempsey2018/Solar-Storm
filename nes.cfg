MEMORY {
  HEADER: start=$00, size=$10, fill=yes, fillval=$00;
  ZEROPAGE: start=$10, size=$ff;
  STACK: start=$0100, size=$0100;
  OAMBUFFER: start=$0200, size=$0100;
  RAM: start=$0300, size=$0500;
  ROM: start=$8000, size=$8000, fill=yes, fillval=$ff;
  CHRROM_TEXT: start=$0000, size=$2000;
  CHRROM_LEVEL1: start=$0000, size=$2000;
  CHRROM_BOSS1: start=$0000, size=$2000;
  CHRROM_LEVEL2: start=$0000, size=$2000;
  CHRROM_BOSS2: start=$0000, size=$2000;
  CHRROM_LEVEL3: start=$0000, size=$2000;
  CHRROM_BOSS3: start=$0000, size=$2000;
  CHRROM_LEVEL4: start=$0000, size=$2000;
  CHRROM_BOSS4: start=$0000, size=$2000;
  CHRROM_TITLE: start=$0000, size=$2000;
  CHRROM_INTRO: start=$0000, size=$2000;
  CHRROM_ENDING: start=$0000, size=$2000;
}

SEGMENTS {
  HEADER: load=HEADER, type=ro, align=$10;
  ZEROPAGE: load=ZEROPAGE, type=zp;
  STACK: load=STACK, type=bss, optional=yes;
  OAM: load=OAMBUFFER, type=bss, optional=yes;
  BSS: load=RAM, type=bss, optional=yes;
  DMC: load=ROM, type=ro, align=64, optional=yes;
  CODE: load=ROM, type=ro, align=$0100;
  RODATA: load=ROM, type=ro, align=$0100;
  VECTORS: load=ROM, type=ro, start=$FFFA;
  CHRROM_TEXT: load=CHRROM_TEXT, type=ro, align=16, optional=yes;
  CHRROM_LEVEL1: load=CHRROM_LEVEL1, type=ro, align=16, optional=yes;
  CHRROM_BOSS1: load=CHRROM_BOSS1, type=ro, align=16, optional=yes;
  CHRROM_LEVEL2: load=CHRROM_LEVEL2, type=ro, align=16, optional=yes;
  CHRROM_BOSS2: load=CHRROM_BOSS2, type=ro, align=16, optional=yes;
  CHRROM_LEVEL3: load=CHRROM_LEVEL3, type=ro, align=16, optional=yes;
  CHRROM_BOSS3: load=CHRROM_BOSS3, type=ro, align=16, optional=yes;
  CHRROM_LEVEL4: load=CHRROM_LEVEL4, type=ro, align=16, optional=yes;
  CHRROM_BOSS4: load=CHRROM_BOSS4, type=ro, align=16, optional=yes;
  CHRROM_TITLE: load=CHRROM_TITLE, type=ro, align=16, optional=yes;
  CHRROM_INTRO: load=CHRROM_INTRO, type=ro, align=16, optional=yes;
  CHRROM_ENDING: load=CHRROM_ENDING, type=ro, align=16, optional=yes;
}